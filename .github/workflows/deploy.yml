name: MLOps Pipeline

on:
  push:
    branches: 
      - main
      - 'feature/github-actions-pipeline'

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install flake8 pytest

      - name: Lint
        run: flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run unit tests
        run: pytest tests/test_train.py -v

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      endpoint_ip: ${{ steps.tf.outputs.endpoint_ip }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: hashicorp/setup-terraform@v3

      - name: Setup AWS Credentials for "colaborador-mlops" profile
        run: |
          mkdir -p ~/.aws
          echo "[colaborador-mlops]" > ~/.aws/credentials
          echo "aws_access_key_id=${{ secrets.AWS_ACCESS_KEY_ID }}" >> ~/.aws/credentials
          echo "aws_secret_access_key=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> ~/.aws/credentials

      - name: Terraform Apply
        id: tf
        working-directory: ./infra
        run: |
          terraform init
          terraform apply -auto-approve
          echo "endpoint_ip=$(terraform output -raw ec2_public_ip)" >> "$GITHUB_OUTPUT"

  validate:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Smoke test
        run: |
          echo "Esperando 120s a que el servidor EC2 y la API levanten..."
          sleep 120
          curl -f -X POST \
            http://${{ needs.deploy.outputs.endpoint_ip }}:80/predict \
            -H "Content-Type: application/json" \
            -d '{"features": [8.3, 41.0, 6.98, 1.02, 322.0, 2.56, 37.88, -122.23]}'
